<header
  class="header-wrap"
  [class.scrolled]="isScrolled"
  [style.--header-progress]="scrollProgress"
>
  <div class="header-glow"></div>

  <div class="header">
    <a routerLink="/" class="brand">
      <img src="/imagenes/atrionlogo.png" alt="Atrion Systems" class="brand-logo-img" />
    </a>

    <nav class="nav">
      <a href="#inicio"><span>Inicio</span></a>
      <a routerLink="/servicios" class="nav-link"><span>Servicios</span></a>
      <a routerLink="/asesorias" class="nav-link"><span>Asesorías</span></a>
      <a (click)="navigateToContacto()" class="nav-link"><span>Contacto</span></a>
    </nav>

    <div class="header-actions">
      <a (click)="navigateToContacto()" class="primary-btn">Hablemos</a>
    </div>
  </div>

  <div class="header-line"></div>
  <div class="header-shadow"></div>
</header>
